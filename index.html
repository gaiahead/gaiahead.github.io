<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gaiahead dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --fg: #0f172a;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --card-hover: #f1f5f9;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --muted: #64748b;
      --tag-bg: #eff6ff;
      --tag-fg: #1d4ed8;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --fg: #f1f5f9;
        --card-bg: #1e293b;
        --card-border: #334155;
        --card-hover: #273449;
        --muted: #94a3b8;
        --tag-bg: #1e3a5f;
        --tag-fg: #93c5fd;
      }
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header { margin-bottom: 48px; }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .divider { height: 1px; background: var(--card-border); margin: 32px 0; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .apps { display: flex; flex-direction: column; gap: 12px; }

    .app-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .app-card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .app-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--tag-bg);
      border-radius: 10px;
    }

    .app-info { flex: 1; min-width: 0; }

    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--fg);
    }

    .app-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-fg);
      white-space: nowrap;
    }

    .arrow {
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.15s;
    }

    .app-card:hover .arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    footer { margin-top: 64px; font-size: 12px; color: var(--muted); }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .app-card { padding: 16px 18px; gap: 12px; }
      .app-icon { width: 40px; height: 40px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">gaiahead</div>
      <h1>도구 모음</h1>
    </header>

    <div class="section-label">앱 목록</div>
    <div class="apps">

      <a class="app-card" href="/uberagent-es-sizing/">
        <div class="app-icon">📊</div>
        <div class="app-info">
          <div class="app-name">uberAgent ES Sizing Calculator</div>
        </div>
        <div class="app-meta">
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="app-card" href="/charts/">
        <div class="app-icon">📈</div>
        <div class="app-info">
          <div class="app-name">추세 강도 모니터</div>
        </div>
        <div class="app-meta">
          <span class="arrow">→</span>
        </div>
      </a>

    </div>

    <div class="divider"></div>

    <footer>dev.gaiahead.com</footer>
  </div>
</body>
</html>
